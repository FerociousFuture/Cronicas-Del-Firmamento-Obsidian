<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki: Crónicas del Firmamento</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --wiki-blue: #0969da;
            --sidebar-bg: #f8f9fa;
            --border-color: #d0d7de;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #ffffff;
        }

        /* Menú Lateral Estilo Wiki */
        #sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: #333;
        }

        #file-tree {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            font-size: 0.9rem;
        }

        /* Estilos del Árbol de Archivos */
        ul { list-style: none; padding-left: 15px; margin: 5px 0; }
        .folder { 
            font-weight: bold; 
            cursor: pointer; 
            padding: 5px 0; 
            display: block;
            color: #24292f;
        }
        .folder:hover { color: var(--wiki-blue); }
        .file-item { 
            cursor: pointer; 
            padding: 3px 8px; 
            color: var(--wiki-blue);
            border-radius: 4px;
            display: block;
        }
        .file-item:hover { background-color: #ebf5ff; }
        .hidden { display: none; }

        /* Contenedor de Lectura */
        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 60px 10%;
            background-color: #fff;
        }

        #reader-container {
            max-width: 850px;
            margin: 0 auto;
        }

        .wiki-breadcrumb {
            font-size: 0.8rem;
            color: #6e7781;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Animación de carga */
        .loading { font-style: italic; color: #888; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h1><i class="fas fa-book-atlas"></i> Crónicas Wiki</h1>
    </div>
    <div id="file-tree">
        <div class="loading">Iniciando biblioteca...</div>
    </div>
</div>

<div id="main-content">
    <div id="reader-container">
        <div id="breadcrumb" class="wiki-breadcrumb">Selecciona una crónica para empezar</div>
        <article id="wiki-body" class="markdown-body">
            <h1>Bienvenido a las Crónicas del Firmamento</h1>
            <p>Usa el menú de la izquierda para navegar por el lore, las facciones y las hojas de personaje.</p>
        </article>
    </div>
</div>

<script>
    const GITHUB_DATA = {
        owner: 'FerociousFuture',
        repo: 'cronicas-del-firmamento-obsidian',
        branch: 'main'
    };

    // Configurar marked.js para que sea seguro
    marked.setOptions({ gfm: true, breaks: true });

    async function fetchRepoData(path = '') {
        const url = `https://api.github.com/repos/${GITHUB_DATA.owner}/${GITHUB_DATA.repo}/contents/${path}?ref=${GITHUB_DATA.branch}`;
        const response = await fetch(url);
        return await response.json();
    }

    async function loadMarkdownFile(fileUrl, fileName) {
        const body = document.getElementById('wiki-body');
        const breadcrumb = document.getElementById('breadcrumb');
        
        body.innerHTML = "<h2 class='loading'>Abriendo pergamino...</h2>";
        breadcrumb.textContent = `Navegando en: ${fileName}`;

        try {
            const res = await fetch(fileUrl);
            const text = await res.text();
            body.innerHTML = marked.parse(text);
            // Hacer scroll hacia arriba al cambiar de archivo
            document.getElementById('main-content').scrollTop = 0;
        } catch (e) {
            body.innerHTML = "<h2>Error</h2><p>No se pudo cargar el archivo.</p>";
        }
    }

    async function renderTree(path, container) {
        const items = await fetchRepoData(path);
        const ul = document.createElement('ul');

        for (const item of items) {
            if (item.name.startsWith('.') || item.name === 'index.html' || item.name === 'README.md') continue;

            const li = document.createElement('li');

            if (item.type === 'dir') {
                li.innerHTML = `<span class="folder"><i class="fas fa-folder"></i> ${item.name}</span>`;
                const subContainer = document.createElement('div');
                subContainer.className = 'hidden';
                li.appendChild(subContainer);
                
                li.querySelector('.folder').onclick = async (e) => {
                    e.stopPropagation();
                    if (subContainer.innerHTML === "") {
                        await renderTree(item.path, subContainer);
                    }
                    subContainer.classList.toggle('hidden');
                };
            } else if (item.name.endsWith('.md')) {
                li.innerHTML = `<span class="file-item"><i class="far fa-file-alt"></i> ${item.name.replace('.md', '')}</span>`;
                li.onclick = (e) => {
                    e.stopPropagation();
                    loadMarkdownFile(item.download_url, item.name);
                };
            } else if (item.name.endsWith('.pdf')) {
                li.innerHTML = `<a href="${item.html_url}" target="_blank" class="file-item"><i class="far fa-file-pdf"></i> ${item.name}</a>`;
            }

            ul.appendChild(li);
        }
        container.appendChild(ul);
    }

    // Arrancar la Wiki
    const treeDiv = document.getElementById('file-tree');
    renderTree('', treeDiv).then(() => {
        treeDiv.querySelector('.loading').remove();
    });
</script>

</body>
</html>
